name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - uses: microsoft/setup-msbuild@v2

    - name: Build
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        mkdir build
        cl /EHsc /O2 /DNDEBUG /utf-8 /Fe:build\ddc_test.exe ddc_test.cpp /link dxva2.lib user32.lib

    - uses: actions/upload-artifact@v4
      with:
        name: DDC-Test-x64
        path: build/ddc_test.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: DDC-Test-x64
        path: release-files

    - uses: softprops/action-gh-release@v2
      with:
        name: DDC-Test ${{ github.ref_name }}
        files: release-files/ddc_test.exe
        body: |
          ## DDC-Test ${{ github.ref_name }}

          DDC/CI monitor brightness test tool.

          ### Usage
          ```
          ddc_test              Enumerate monitors and show DDC/CI info
          ddc_test --get        Show current brightness
          ddc_test --set <N>    Set brightness to N% (0-100)
          ```
